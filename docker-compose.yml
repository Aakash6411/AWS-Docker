version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  postgres_db:
    image: postgres:15-alpine
    container_name: ecom_db
    restart: always
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_secure_password
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ecom_network

  # 2. Caching Service (Redis)
  redis_cache:
    image: redis:7-alpine
    container_name: ecom_cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ecom_network

  # 3. Backend API Service (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_backend
    restart: always
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://ecom_user:ecom_secure_password@postgres_db:5432/ecommerce_db
      - REDIS_URL=redis://redis_cache:6379
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      - postgres_db
      - redis_cache
    networks:
      - ecom_network

  # 4. Frontend Service (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecom_network

volumes:
  pgdata: # Ensures e-commerce product and user data is persisted on restart

networks:
  ecom_network:
    driver: bridge